<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KBC - College Edition</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@600&display=swap" rel="stylesheet">

  <!-- Load Socket.IO from CDN -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
  </script>

  <style>
    .logo-container {
      position: fixed;
      top: 15px;
      left: 220px;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 100;
      pointer-events: none;
    }
    .logo-container img {
      height: 50px;
      pointer-events: auto;
    }
    
    @media (max-width: 900px) {
      .logo-container {
        position: relative;
        left: 0;
        top: 0;
        flex-direction: column;
        align-items: center;
        padding: 15px;
        gap: 15px;
        background: rgba(0,0,0,0.4);
      }
      .logo-container img {
        height: auto !important;
        max-height: 80px;
      }
    }

    /* Autoplay Unlock Overlay */
    #audio-unlock-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #0e163d 0%, #04081c 100%);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #audio-unlock-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .unlock-content {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .unlock-logo {
      height: 120px;
      margin-bottom: 20px;
      animation: pulse-logo 2s infinite alternate;
    }
    .unlock-title {
      color: gold;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 12px;
    }
    .unlock-text {
      color: #a0aec0;
      font-size: 1rem;
      margin-bottom: 25px;
      line-height: 1.5;
    }
    .unlock-btn {
      background: linear-gradient(135deg, gold, #ff9900);
      color: #001f5b;
      font-weight: 800;
      font-size: 1.1rem;
      border: none;
      padding: 15px 40px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
      width: 100%;
      transition: all 0.2s;
    }
    .unlock-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
    }
    @keyframes pulse-logo {
      0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.2)); }
      100% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.5)); }
    }
  </style>
</head>
<body>

  <!-- Autoplay / Audio Unlock Overlay -->
  <div id="audio-unlock-overlay">
    <div class="unlock-content">
      <img class="unlock-logo" src="WhatsApp Image 2025-09-13 at 12.36.38 PM.jpeg" alt="KBC Logo">
      <h2 class="unlock-title">KBC Quiz System</h2>
      <p class="unlock-text">Click below to join the game screen and enable all dynamic audio and timer effects.</p>
      <button id="unlock-audio-btn" class="unlock-btn">Join Game</button>
    </div>
  </div>

  <!-- Logos -->
  <div class="logo-container">
    <div style="display:flex; justify-content:flex-start; align-items:flex-start;">
      <img style="height:150px;" src="Screenshot_2025-09-15_184559-removebg-preview.png" alt="Left Logo">
    </div>
    <img style="height: 120px;" src="Screenshot_2025-09-15_184622-removebg-preview.png" alt="Right Logo">
  </div>

  <div class="kbc-container">
    <!-- Prize Ladder -->
    <div class="prize-ladder">
      <ul id="points-tree">
        <li><span>200</span></li>
        <li><span>180</span></li>
        <li><span>160</span></li>
        <li><span>140</span></li>
        <li><span>120</span></li>
        <li><span>100</span></li>
        <li><span>80</span></li>
        <li><span>60</span></li>
        <li><span>40</span></li>
        <li><span>20</span></li>
        <li class="current"><span>0</span></li>
      </ul>
    </div>

    <!-- Game Area -->
    <div class="game-area">
      <div class="header">
        <img style="height: 200px;" src="WhatsApp Image 2025-09-13 at 12.36.38 PM.jpeg" alt="">
      </div>
      <div class="timer">30</div>

      <div class="question-box">
        <p id="question-text">ANSWER THE QUESTIONS...</p>
      </div>

      <div class="options-grid" id="options-container">
        <!-- Options injected here -->
      </div>

      <div id="result-message"></div>
    </div>
  </div>

  <!-- Audio Feedback -->
  <audio id="snd-correct" src="kbc-right-answer-new.mp3.mpeg" preload="auto"></audio>
  <audio id="snd-wrong" src="kbc-wrong-answer.mp3.mpeg" preload="auto"></audio>
  <audio id="snd-locked" src="kbc-answer-locked-in.mp3.mpeg" preload="auto"></audio>
  <audio id="snd-question" src="kbc-question-2.mp3.mpeg" preload="auto"></audio>
  <audio id="snd-suspense" src="kbc-suspense_o30B6l1.mp3.mpeg" preload="auto" loop></audio>

  <!-- ✅ Only one script include -->
  <script src="script.js"></script>

  <!-- Custom Loss Modal (no browser alerts) -->
  <div id="loss-modal" class="custom-modal">
    <div class="custom-modal-content">
      <div class="modal-icon"><i class="fas fa-times-circle"></i></div>
      <h2>GAME OVER</h2>
      <p class="loss-message" id="loss-modal-message">Unfortunately, that is the wrong answer!</p>
      <div class="score-display">
        <span>Final Points:</span>
        <strong id="modal-final-score">0</strong>
      </div>
      <button class="modal-btn" onclick="closeLossModal()">Dismiss</button>
    </div>
  </div>
</body>
</html>
